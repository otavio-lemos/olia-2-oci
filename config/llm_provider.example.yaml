# LLM Provider Configuration â€” Dataset Generation
# =============================================================================
# Copie este arquivo para config/llm_provider.yaml e preencha com suas chaves.
# O arquivo llm_provider.yaml estĂ¡ no .gitignore e NUNCA deve ser commitado.
#
# Uso:
#   cp config/llm_provider.example.yaml config/llm_provider.yaml
#   # edite llm_provider.yaml com sua API key
#   python scripts/generate_llm_v2.py          # versĂ£o async (recomendada)
#   python scripts/generate_llm_v2.py --concurrency 20  # ajusta concorrĂªncia
#   python scripts/generate_llm_v1.py          # versĂ£o sequencial (legado)
# =============================================================================

# =============================================================================
# OPĂ‡ĂƒO 1 (RECOMENDADA): Google Gemini via AI Studio
# Obtenha sua key GRATUITA em https://aistudio.google.com/apikey
# Vantagens: output enorme (65k tokens), batch de 60 exemplos sem truncar,
#            mais rĂ¡pido e confiĂ¡vel que OpenRouter free tier.
# =============================================================================

provider:
  name: google-gemini
  base_url: https://generativelanguage.googleapis.com/v1beta/openai/
  api_key: "AIzaSy-COLOQUE_SUA_KEY_AQUI"   # https://aistudio.google.com/apikey

# gemini-2.5-flash: mais rĂ¡pido, free, ideal para geraĂ§Ă£o em volume
# gemini-2.5-pro:   mais capaz, free tier com limites menores
models:
  - id: "gemini-2.5-flash"
    weight: 3                               # rĂ¡pido, free, output atĂ© 65k tokens
  - id: "gemini-2.5-pro"
    weight: 1                               # mais capaz, usa quando flash falhar

rate_limit:
  requests_per_minute: 15                  # AI Studio free: 15 RPM (flash) / 5 RPM (pro)
  requests_per_day: 1500                   # limite diĂ¡rio generous no free tier
  max_concurrent: 10                       # [v2] requests simultĂ¢neos â€” ajuste conforme RPM do seu plano
                                           # free tier: 10-15 | pago: 20-30
  retry_attempts: 5
  retry_delay_seconds: 4
  inter_request_delay_seconds: 4.0         # usado apenas pelo v1 (legado)

generation:
  target_examples: 15120                   # total de exemplos (84 cats Ă— 180 = 15.120)
  examples_per_category: 180
  batch_size: 60                           # Gemini aguenta 60 exemplos por request
  max_tokens: 65000                        # Gemini suporta output grande sem truncar
  max_failures_per_batch: 5
  temperature: 0.85
  checkpoint_every: 60
  output_dir: data/curated/llm_generated
  checkpoint_file: data/.llm_gen_checkpoint.json

http_headers: {}

