# =============================================================================
# LLM Provider Configuration — Dataset Generation
# =============================================================================
# Copie este arquivo para config/llm_provider.yaml e preencha com suas chaves.
# O arquivo llm_provider.yaml está no .gitignore e NUNCA deve ser commitado.
#
# Uso:
#   cp config/llm_provider.example.yaml config/llm_provider.yaml
#   # edite llm_provider.yaml com sua API key
#   python scripts/generate_llm_v1.py
# =============================================================================

provider:
  name: openrouter                          # openrouter | ollama | openai
  base_url: https://openrouter.ai/api/v1
  api_key: "sk-or-v1-COLOQUE_SUA_KEY_AQUI"  # Obtenha em https://openrouter.ai/keys

# Modelos gratuitos no OpenRouter (abril 2026).
# O script rotaciona entre eles automaticamente para maximizar throughput.
# Context window suficiente para batch de 30 exemplos (~24k tokens output).
models:
  - id: "z-ai/glm-4.5-air:free"
    weight: 2                               # max_output: 96k tokens
  - id: "nvidia/nemotron-3-nano-30b-a3b:free"
    weight: 2                               # max_output: 256k tokens
  - id: "openai/gpt-oss-120b:free"
    weight: 1                               # max_output: 131k tokens

rate_limit:
  requests_per_minute: 20                  # limite por modelo (OpenRouter free tier)
  requests_per_day: 200                    # limite diário por modelo
  retry_attempts: 5                        # tentativas antes de trocar de modelo
  retry_delay_seconds: 4                   # espera base entre tentativas (exponential backoff)
  inter_request_delay_seconds: 4.0         # delay entre requests (batch precisa de menos requests)

generation:
  target_examples: 17750                   # total de exemplos (71 cats × 250 = 17.750)
  examples_per_category: 250              # exemplos por categoria (alinhado com taxonomy.md)
  batch_size: 30                           # exemplos por request — reduz requests de 17750 → ~592
  max_tokens: 24500                        # 30 × ~800 tokens/exemplo + 500 overhead
  temperature: 0.85                        # criatividade (0.7-0.9 é bom para diversidade)
  checkpoint_every: 30                     # salva progresso a cada N exemplos
  output_dir: data/curated/llm_generated   # onde salvar os JSONL gerados
  checkpoint_file: data/.llm_gen_checkpoint.json  # arquivo de checkpoint para resume

# Headers extras enviados para o OpenRouter (para identificação na dashboard)
http_headers:
  HTTP-Referer: "https://github.com/otavio-lemos/olia-2-oci"
  X-Title: "olia-2-oci dataset generation"
